backend:
  name: git-gateway
  branch: main
  # IMPORTANT: For Cloudflare Pages static hosting, Decap CMS requires an OAuth proxy.
  # The included worker at workers/decap-oauth/ implements a GitHub OAuth proxy.
  # In production, switch backend.name to 'github' and set base_url to your OAuth worker.

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

i18n:
  structure: multiple_files
  locales: [zh-hant, zh-hans, en]
  default_locale: zh-hant

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - file: "content/site-settings.json"
        label: "Global Settings"
        i18n: true
        fields:
          - { name: "site_name", label: "Site Name", widget: "string", i18n: true }
          - { name: "logo", label: "Logo", widget: "image" }
          - name: "contact"
            label: "Contact Info"
            widget: "object"
            i18n: true
            fields:
              - { name: "address", label: "Address", widget: "text" }
              - { name: "phone", label: "Phone", widget: "string" }
              - { name: "email", label: "Email", widget: "string" }

  - name: "navigation"
    label: "Navigation"
    files:
      - file: "content/navigation.json"
        label: "Main Menu"
        i18n: true
        fields:
          - name: "items"
            label: "Menu Items"
            widget: "list"
            i18n: true
            fields:
              - { name: "label", label: "Label", widget: "string", i18n: true }
              - { name: "url", label: "URL", widget: "string" }
              - name: "children"
                label: "Sub-menu Items"
                widget: "list"
                required: false
                fields:
                  - { name: "label", label: "Label", widget: "string", i18n: true }
                  - { name: "url", label: "URL", widget: "string" }

  - name: "home"
    label: "Home Page"
    files:
      - file: "content/home.md"
        label: "Home Content"
        i18n: true
        fields:
          - { name: "hero_title", label: "Hero Title", widget: "string", i18n: true }
          - { name: "hero_subtitle", label: "Hero Subtitle", widget: "string", i18n: true }
          - { name: "hero_description", label: "Hero Description", widget: "markdown", i18n: true }
          - { name: "hero_image", label: "Hero Background Image", widget: "image", required: false }

  - name: "about"
    label: "About Us"
    files:
      - file: "content/about.md"
        label: "About Content"
        i18n: true
        fields:
          - { name: "title", label: "Page Title", widget: "string", i18n: true }
          - { name: "company_intro", label: "Company Introduction", widget: "markdown", i18n: true }
          - { name: "blockquote", label: "Blockquote", widget: "text", i18n: true }
          - { name: "cta_title", label: "CTA Title", widget: "string", i18n: true }
          - { name: "cta_description", label: "CTA Description", widget: "text", i18n: true }
          - { name: "cta_button", label: "CTA Button Text", widget: "string", i18n: true }

  - name: "milestones"
    label: "Timeline"
    folder: "content/milestones"
    create: true
    i18n: true
    fields:
      - { name: "year", label: "Year", widget: "string" }
      - { name: "title", label: "Title", widget: "string", i18n: true }
      - { name: "description", label: "Description", widget: "text", i18n: true }
      - { name: "order", label: "Display Order", widget: "number", default: 0 }

  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    i18n: true
    fields:
      - { name: "slug", label: "URL Slug", widget: "string" }
      - { name: "title", label: "Service Title", widget: "string", i18n: true }
      - { name: "short_description", label: "Short Description (Card)", widget: "text", i18n: true }
      - { name: "full_description", label: "Full Description", widget: "markdown", i18n: true }
      - { name: "scope", label: "Scope of Services", widget: "markdown", i18n: true }
      - { name: "icon", label: "Icon Image", widget: "image", required: false }
      - { name: "order", label: "Display Order", widget: "number", default: 0 }

  - name: "inquiries"
    label: "Inquiries"
    folder: "content/inquiries"
    create: false
    fields:
      - { name: "name", label: "Name", widget: "string" }
      - { name: "company", label: "Company", widget: "string" }
      - { name: "email", label: "Email", widget: "string" }
      - { name: "phone", label: "Phone", widget: "string", required: false }
      - { name: "service", label: "Service", widget: "string" }
      - { name: "message", label: "Message", widget: "text" }
      - { name: "status", label: "Status", widget: "select", options: ["new", "contacted", "closed"] }
      - { name: "submitted_at", label: "Submitted At", widget: "datetime" }
