<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTCPA CMS Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    .toast { transition: all 0.3s ease; }
    .toast.hidden { opacity: 0; transform: translateY(-10px); pointer-events: none; }
    .toast.visible { opacity: 1; transform: translateY(0); }
    .nav-group-title { letter-spacing: 0.08em; }
    .nav-item { border-left: 3px solid transparent; transition: all 0.15s ease; }
    .nav-item.active { background: rgba(198,150,62,0.08); border-left-color: #c6963e; color: #1f232d; font-weight: 600; }
    .nav-item:hover:not(.active) { background: rgba(31,35,45,0.04); }
    .section-panel { display: none; }
    .section-panel.active { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .group-content { overflow: hidden; transition: max-height 0.25s ease; }
    .chevron { transition: transform 0.2s ease; }
    .chevron.open { transform: rotate(180deg); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">

  <!-- Login -->
  <div id="login" class="fixed inset-0 z-50 flex items-center justify-center bg-navy-900">
    <div class="w-full max-w-sm p-8 rounded-2xl bg-white shadow-2xl">
      <div class="flex justify-center mb-6">
        <img src="/admin/logo.png" alt="Admin Logo" class="h-20 w-auto object-contain">
      </div>
      <h1 class="text-2xl font-bold text-navy-900 mb-1 text-center">LTCPA Admin</h1>
      <p class="text-sm text-slate-500 text-center mb-6">Enter admin token to continue</p>
      <input id="loginToken" type="password" placeholder="Admin Token" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 mb-4 focus:outline-none focus:ring-2 focus:ring-gold-400">
      <button onclick="doLogin()" class="w-full bg-navy-800 hover:bg-navy-900 text-white font-semibold py-2.5 rounded-xl transition">Login</button>
      <div id="loginError" class="text-red-600 text-sm mt-3 text-center hidden">Invalid token</div>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 shadow-sm">
      <div class="flex items-center justify-between px-6 py-3">
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-3">
            <img src="/admin/logo.png" alt="Admin Logo" class="h-10 w-auto object-contain">
            <div class="text-xl font-bold tracking-tight text-navy-900">LTCPA <span class="text-gold-600">CMS</span></div>
          </div>
          <div class="flex bg-navy-50 rounded-lg overflow-hidden border border-navy-100">
            <button class="lang-tab px-4 py-1.5 text-sm hover:bg-navy-100 transition bg-navy-100 font-medium text-navy-900" data-lang="zh-hant" onclick="setLang('zh-hant')">繁體中文</button>
            <button class="lang-tab px-4 py-1.5 text-sm hover:bg-navy-100 transition text-navy-700" data-lang="zh-hans" onclick="setLang('zh-hans')">简体中文</button>
            <button class="lang-tab px-4 py-1.5 text-sm hover:bg-navy-100 transition text-navy-700" data-lang="en" onclick="setLang('en')">English</button>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="doDeploy()" class="bg-gold-500 hover:bg-gold-600 text-white font-semibold px-5 py-2 rounded-lg transition shadow-sm">Deploy Site</button>
        </div>
        <!-- Hidden debug field preserved for emergency console access only -->
        <div class="hidden">
          <input id="apiBaseInput" type="text" onchange="setApiBase(this.value)">
          <button type="button" onclick="resetApiBase()">Reset</button>
        </div>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <aside class="w-64 bg-white border-r border-slate-200 flex flex-col overflow-y-auto">
        <nav class="flex-1 py-4">
          <!-- Global -->
          <div class="px-4 mb-1">
            <div class="nav-group-title text-[10px] font-bold text-slate-400 uppercase tracking-wider">Global</div>
          </div>
          <button class="nav-item w-full text-left px-5 py-2 text-sm text-slate-700 active" data-sec="site" onclick="setSection('site')">
            <span class="inline-flex items-center gap-2"><svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.67 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.67a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Site Settings</span>
          </button>

          <!-- Layout -->
          <div class="px-4 mt-4 mb-1">
            <div class="nav-group-title text-[10px] font-bold text-slate-400 uppercase tracking-wider">Layout</div>
          </div>
          <button class="nav-item w-full text-left px-5 py-2 text-sm text-slate-700" data-sec="header" onclick="setSection('header')">
            <span class="inline-flex items-center gap-2"><svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>Header</span>
          </button>
          <button class="nav-item w-full text-left px-5 py-2 text-sm text-slate-700" data-sec="footer" onclick="setSection('footer')">
            <span class="inline-flex items-center gap-2"><svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>Footer</span>
          </button>

          <!-- Content Pages -->
          <div class="px-4 mt-4 mb-1">
            <div class="nav-group-title text-[10px] font-bold text-slate-400 uppercase tracking-wider">Content Pages</div>
          </div>
          <button class="nav-item w-full text-left px-5 py-2 text-sm text-slate-700" data-sec="home" onclick="setSection('home')">
            <span class="inline-flex items-center gap-2"><svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</span>
          </button>

          <!-- About (Collapsible) -->
          <div class="px-5">
            <button onclick="toggleGroup('aboutGroup', this)" class="w-full flex items-center justify-between py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-700">
              <span class="inline-flex items-center gap-2"><svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>About</span>
              <svg class="chevron w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <div id="aboutGroup" class="group-content">
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="about" onclick="setSection('about')">Overview</button>
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="purpose" onclick="setSection('purpose')">Purpose</button>
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="value" onclick="setSection('value')">Vision</button>
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="commitment" onclick="setSection('commitment')">Commitment</button>
            </div>
          </div>

          <button class="nav-item w-full text-left px-5 py-2 text-sm text-slate-700" data-sec="contact" onclick="setSection('contact')">
            <span class="inline-flex items-center gap-2"><svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Contact</span>
          </button>

          <!-- Services (Collapsible) -->
          <div class="px-4 mt-4 mb-1">
            <div class="nav-group-title text-[10px] font-bold text-slate-400 uppercase tracking-wider">Services</div>
          </div>
          <div class="px-5">
            <button onclick="toggleGroup('svcGroup', this)" class="w-full flex items-center justify-between py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-700">
              <span class="inline-flex items-center gap-2"><svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Service Pages</span>
              <svg class="chevron w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <div id="svcGroup" class="group-content">
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="services" onclick="setSection('services')">Overview</button>
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="service_audit" onclick="setSection('service_audit')">Audit</button>
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="service_tax" onclick="setSection('service_tax')">Tax</button>
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="service_risk" onclick="setSection('service_risk')">Risk</button>
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="service_forensic" onclick="setSection('service_forensic')">Forensic</button>
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="service_consulting" onclick="setSection('service_consulting')">Consulting</button>
              <button class="nav-item w-full text-left pl-8 pr-4 py-1.5 text-sm text-slate-600" data-sec="service_deals" onclick="setSection('service_deals')">Deals</button>
            </div>
          </div>

          <!-- Library -->
          <div class="px-4 mt-4 mb-1">
            <div class="nav-group-title text-[10px] font-bold text-slate-400 uppercase tracking-wider">Library & Analytics</div>
          </div>
          <button class="nav-item w-full text-left px-5 py-2 text-sm text-slate-700" data-sec="media" onclick="setSection('media')">
            <span class="inline-flex items-center gap-2"><svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Media Gallery</span>
          </button>
          <button class="nav-item w-full text-left px-5 py-2 text-sm text-slate-700" data-sec="analytics" onclick="setSection('analytics')">
            <span class="inline-flex items-center gap-2"><svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Visitor Statistics</span>
          </button>
        </nav>
        <div class="px-5 py-4 border-t border-slate-200 text-xs text-slate-400">
          <div class="flex items-center gap-2">
            <span>Powered by</span>
            <a href="https://jkdcoding.com" target="_blank" class="text-gold-600 hover:underline font-semibold">JKDCoding</a>
          </div>
        </div>
      </aside>

      <main class="flex-1 overflow-y-auto p-8 bg-slate-50/50">
        <div id="sectionsContainer"></div>
      </main>
    </div>
  </div>

  <div id="toast" class="toast hidden fixed top-4 right-4 z-50 px-5 py-3 rounded-xl shadow-lg text-white font-medium"></div>

  <script>
    const DEFAULT_API_BASE = 'https://ltcpa-cms-api.jimsbond007.workers.dev/api/cms';
    function getApiBase() {
      const stored = localStorage.getItem('cms_api_url');
      if (stored && (stored.startsWith('http://') || stored.startsWith('https://'))) return stored;
      return DEFAULT_API_BASE;
    }
    function setApiBase(val) {
      if (!val) val = DEFAULT_API_BASE;
      if (!val.startsWith('http://') && !val.startsWith('https://')) {
        showToast('API Base must be a full URL starting with http:// or https://', 'error');
        document.getElementById('apiBaseInput').value = getApiBase();
        return;
      }
      localStorage.setItem('cms_api_url', val);
      API_BASE = val;
      showToast('API Base updated');
    }
    function resetApiBase() {
      localStorage.removeItem('cms_api_url');
      API_BASE = DEFAULT_API_BASE;
      document.getElementById('apiBaseInput').value = DEFAULT_API_BASE;
      showToast('API Base reset to default');
    }
    let API_BASE = getApiBase();
    document.getElementById('apiBaseInput').value = API_BASE;
    let token = '';
    let currentLang = 'zh-hant';
    let currentSection = 'site';
    let cmsData = {};
    let defaultsData = {};

    function deepMerge(target, source) {
      if (source === null || source === undefined) return target;
      if (typeof source !== 'object') {
        // For strings, if source is empty but target has a value, use target (fallback)
        if (typeof source === 'string' && source.trim() === '' && typeof target === 'string' && target.trim() !== '') {
          return target;
        }
        return source;
      }
      if (Array.isArray(source)) {
        if (!Array.isArray(target)) return source;
        // Merge arrays item-by-item when elements are objects (e.g. scopeItems)
        return source.map((item, idx) => {
          if (typeof item === 'object' && item !== null && !Array.isArray(item) &&
              typeof target[idx] === 'object' && target[idx] !== null && !Array.isArray(target[idx])) {
            return deepMerge(target[idx], item);
          }
          return item;
        });
      }
      const result = {};
      const allKeys = new Set([...Object.keys(target || {}), ...Object.keys(source)]);
      for (const key of allKeys) {
        if (key in source) {
          result[key] = deepMerge(target?.[key], source[key]);
        } else {
          result[key] = target[key];
        }
      }
      return result;
    }

    function toggleGroup(id, btn) {
      const el = document.getElementById(id);
      const chevron = btn.querySelector('.chevron');
      const isOpen = el.style.maxHeight && el.style.maxHeight !== '0px';
      if (isOpen) {
        el.style.maxHeight = '0px';
        chevron.classList.remove('open');
      } else {
        el.style.maxHeight = el.scrollHeight + 'px';
        chevron.classList.add('open');
      }
    }

    function doLogin() {
      const val = document.getElementById('loginToken').value.trim();
      if (!val) return;
      token = val;
      fetch(`${API_BASE}/auth/verify`, { headers: { 'X-Admin-Token': token } })
        .then(r => { if (!r.ok) throw new Error('Unauthorized'); return r.json(); })
        .then(() => fetch(`${API_BASE}/data`))
        .then(r => r.json())
        .then(data => {
          cmsData = data || {};
          // Load defaults and merge so admin shows fallback data when KV is incomplete
          return fetch('/admin/cms-defaults.json')
            .then(r => r.ok ? r.json() : {})
            .then(defs => {
              defaultsData = defs || {};
              for (const loc of ['en', 'zh-hant', 'zh-hans']) {
                if (defaultsData[loc] || cmsData[loc]) {
                  cmsData[loc] = deepMerge(defaultsData[loc] || {}, cmsData[loc] || {});
                }
              }
            })
            .catch(() => {})
            .finally(() => {
              document.getElementById('login').classList.add('hidden');
              document.getElementById('app').classList.remove('hidden');
              // Open collapsible groups by default
              setTimeout(() => {
                const svcBtn = document.querySelector('[onclick^="toggleGroup(\'svcGroup\'"]');
                if (svcBtn) toggleGroup('svcGroup', svcBtn);
                const aboutBtn = document.querySelector('[onclick^="toggleGroup(\'aboutGroup\'"]');
                if (aboutBtn) toggleGroup('aboutGroup', aboutBtn);
              }, 0);
              renderSections();
            });
        })
        .catch(() => { document.getElementById('loginError').classList.remove('hidden'); });
    }

    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast visible fixed top-4 right-4 z-50 px-5 py-3 rounded-xl shadow-lg text-white font-medium ${type==='success'?'bg-green-600':'bg-red-600'}`;
      setTimeout(() => { t.classList.remove('visible'); t.classList.add('hidden'); }, 3000);
    }

    function setLang(l) {
      currentLang = l;
      document.querySelectorAll('.lang-tab').forEach(b => {
        b.classList.toggle('bg-navy-100', b.dataset.lang === l);
        b.classList.toggle('font-medium', b.dataset.lang === l);
        b.classList.toggle('text-navy-900', b.dataset.lang === l);
        b.classList.toggle('text-navy-700', b.dataset.lang !== l);
      });
      renderSections();
    }

    function setSection(s) {
      currentSection = s;
      document.querySelectorAll('.nav-item').forEach(b => {
        b.classList.toggle('active', b.dataset.sec === s);
      });
      document.querySelectorAll('.section-panel').forEach(sec => {
        sec.classList.toggle('active', sec.id === 'sec-' + s);
      });
    }

    function getLangObj() {
      if (!cmsData[currentLang]) cmsData[currentLang] = {};
      return cmsData[currentLang];
    }

    function escapeHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Generic form helpers
    function inputText(id, label, value) {
      return `<div class="mb-4"><label class="block text-sm font-semibold text-slate-700 mb-1">${label}</label><input type="text" id="${id}" value="${escapeHtml(value)}" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gold-400 bg-white"></div>`;
    }
    function inputTextarea(id, label, value, rows=3) {
      return `<div class="mb-4"><label class="block text-sm font-semibold text-slate-700 mb-1">${label}</label><textarea id="${id}" rows="${rows}" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gold-400 bg-white">${escapeHtml(value)}</textarea></div>`;
    }
    function inputImage(id, label, value) {
      return `<div class="mb-4"><label class="block text-sm font-semibold text-slate-700 mb-1">${label}</label><div class="flex gap-2"><input type="text" id="${id}" value="${escapeHtml(value)}" class="flex-1 border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gold-400 bg-white"><input type="file" id="${id}_file" accept="image/*" class="hidden" onchange="uploadImage('${id}')"><button type="button" onclick="document.getElementById('${id}_file').click()" class="bg-navy-800 hover:bg-navy-900 text-white px-4 py-2 rounded-lg text-sm">Upload</button></div></div>`;
    }
    function arrayContainer(id, label, itemsHTML) {
      return `<div class="mb-6"><div class="flex items-center justify-between mb-2"><label class="block text-sm font-semibold text-slate-700">${label}</label><button type="button" onclick="addArrayItem('${id}')" class="text-sm bg-gold-500 hover:bg-gold-600 text-white font-semibold px-3 py-1 rounded">+ Add</button></div><div id="${id}_list" class="space-y-3">${itemsHTML}</div></div>`;
    }
    function arrayItemWrapper(prefix, idx, innerHTML) {
      return `<div class="border border-slate-200 rounded-lg p-3 bg-white relative array-item" data-prefix="${prefix}" data-idx="${idx}"><button type="button" onclick="this.closest('.array-item').remove()" class="absolute top-2 right-2 text-red-500 hover:text-red-700 text-sm font-semibold">Remove</button><div class="grid grid-cols-1 md:grid-cols-2 gap-3 pr-16">${innerHTML}</div></div>`;
    }
    function smallInput(id, label, value) {
      return `<div><label class="block text-xs font-semibold text-slate-600 mb-1">${label}</label><input type="text" data-field="${id}" value="${escapeHtml(value)}" class="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-gold-400 bg-white"></div>`;
    }
    function smallTextarea(id, label, value) {
      return `<div class="md:col-span-2"><label class="block text-xs font-semibold text-slate-600 mb-1">${label}</label><textarea data-field="${id}" rows="2" class="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-gold-400 bg-white">${escapeHtml(value)}</textarea></div>`;
    }
    function smallImage(id, label, value) {
      return `<div><label class="block text-xs font-semibold text-slate-600 mb-1">${label}</label><div class="flex gap-2"><input type="text" data-field="${id}" value="${escapeHtml(value)}" class="flex-1 border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-gold-400 bg-white"><input type="file" id="${id}_file" accept="image/*" class="hidden" onchange="uploadImageForField(this)"><button type="button" onclick="document.getElementById('${id}_file').click()" class="bg-navy-800 hover:bg-navy-900 text-white px-2 py-1 rounded text-xs">Up</button></div></div>`;
    }
    function sectionBox(id, title, innerHTML) {
      return `<div id="sec-${id}" class="section-panel max-w-5xl bg-white rounded-xl shadow-sm border border-slate-200 p-6 ${id===currentSection?'active':''}"><h2 class="text-xl font-bold text-navy-900 mb-4">${title}</h2>${innerHTML}<div class="mt-6 flex justify-end"><button type="button" onclick="saveSection('${id}')" class="bg-navy-800 hover:bg-navy-900 text-white font-semibold px-6 py-2 rounded-lg transition">Save Section</button></div></div>`;
    }

    async function uploadImage(inputId) {
      const fileInput = document.getElementById(inputId + '_file');
      if (!fileInput.files.length) return;
      const form = new FormData();
      form.append('file', fileInput.files[0]);
      try {
        const r = await fetch(`${API_BASE}/upload`, { method: 'POST', headers: { 'X-Admin-Token': token }, body: form });
        const data = await r.json();
        if (data.success) { document.getElementById(inputId).value = data.url; showToast('Image uploaded'); }
        else { showToast(data.error || 'Upload failed', 'error'); }
      } catch (e) { showToast('Upload error', 'error'); }
    }
    async function uploadImageForField(btn) {
      const fileInput = btn;
      if (!fileInput.files.length) return;
      const form = new FormData();
      form.append('file', fileInput.files[0]);
      try {
        const r = await fetch(`${API_BASE}/upload`, { method: 'POST', headers: { 'X-Admin-Token': token }, body: form });
        const data = await r.json();
        if (data.success) { fileInput.previousElementSibling.value = data.url; showToast('Image uploaded'); }
        else { showToast(data.error || 'Upload failed', 'error'); }
      } catch (e) { showToast('Upload error', 'error'); }
    }

    window.uploadImage = uploadImage;
    window.uploadImageForField = uploadImageForField;

    function readArray(prefix, fieldNames) {
      const list = document.getElementById(prefix + '_list');
      const arr = [];
      if (!list) return arr;
      list.querySelectorAll('.array-item').forEach(div => {
        const item = {};
        fieldNames.forEach(fn => {
          const input = div.querySelector(`[data-field="${prefix}_${div.dataset.idx}_${fn}"]`);
          item[fn] = input ? input.value : '';
        });
        arr.push(item);
      });
      return arr;
    }

    function filterGallery(type) {
      document.querySelectorAll('.gal-filter').forEach(btn => {
        btn.classList.remove('bg-navy-800', 'text-white');
        btn.classList.add('bg-slate-200', 'text-slate-700');
      });
      const activeBtn = document.getElementById(type === 'all' ? 'galFilterAll' : type === 'static' ? 'galFilterStatic' : 'galFilterR2');
      activeBtn.classList.remove('bg-slate-200', 'text-slate-700');
      activeBtn.classList.add('bg-navy-800', 'text-white');
      window._galleryFilter = type;
      renderGalleryGrid();

    function searchGallery() {
      window._gallerySearch = document.getElementById('gallerySearch').value.toLowerCase();
      renderGalleryGrid();
    }

    function renderGalleryGrid() {
      const container = document.getElementById('mediaGalleryContent');
      const statsEl = document.getElementById('mediaGalleryStats');
      if (!galleryAllObjects.length) {
        container.innerHTML = '<div class="text-slate-500">No media found.</div>';
        if (statsEl) statsEl.textContent = '';
        return;
      }
      const filter = window._galleryFilter || 'all';
      const search = window._gallerySearch || '';
      let items = galleryAllObjects;
      if (filter !== 'all') items = items.filter(o => o.source === filter);
      if (search) items = items.filter(o => o.key.toLowerCase().includes(search));

      if (statsEl) statsEl.textContent = `Showing ${items.length} of ${galleryAllObjects.length} images`;

      if (items.length === 0) {
        container.innerHTML = '<div class="text-slate-500">No images match your filters.</div>';
        return;
      }

      let html = '<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">';
      items.forEach(obj => {
        const isR2 = obj.source === 'r2';
        const badgeColor = isR2 ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700';
        const badgeLabel = isR2 ? 'Uploaded' : 'Static';
        const deleteBtn = isR2
          ? `<button onclick="deleteMedia('${obj.key}')" class="text-[10px] bg-red-50 hover:bg-red-100 text-red-600 py-1 px-2 rounded transition">Delete</button>`
          : `<span class="text-[10px] text-slate-400 py-1 px-2">Read-only</span>`;
        html += `<div class="border rounded-lg overflow-hidden bg-white group hover:shadow-md transition" data-key="${obj.key}">
          <div class="relative">
            <img src="${obj.url}" class="w-full h-28 object-cover" loading="lazy">
            <span class="absolute top-2 left-2 text-[10px] font-bold px-2 py-0.5 rounded-full ${badgeColor}">${badgeLabel}</span>
          </div>
          <div class="p-2">
            <div class="text-xs text-slate-700 font-medium truncate mb-1" title="${obj.key}">${obj.key}</div>
            <div class="flex gap-1">
              <button onclick="navigator.clipboard.writeText('${obj.url}').then(()=>showToast('URL copied'))" class="flex-1 text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-600 py-1 rounded transition">Copy URL</button>
              ${deleteBtn}
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    async function loadMediaGallery() {
      const container = document.getElementById('mediaGalleryContent');
      container.innerHTML = '<div class="text-slate-500">Loading media...</div>';
      try {
        const [r2Res, staticRes] = await Promise.all([
          fetch(`${API_BASE}/media`, { headers: { 'X-Admin-Token': token } }),
          fetch('/images-manifest.json')
        ]);
        let r2Objects = [];
        let staticObjects = [];
        const r2Data = await r2Res.json();
        if (r2Data.success && r2Data.objects) r2Objects = r2Data.objects.map(o => ({...o, source: 'r2'}));
        const staticData = await staticRes.json().catch(() => ({ objects: [] }));
        if (staticData.objects) staticObjects = staticData.objects.map(o => ({...o, source: 'static'}));

        galleryAllObjects = [...staticObjects, ...r2Objects];
        window._galleryFilter = 'all';
        window._gallerySearch = '';
        const searchInput = document.getElementById('gallerySearch');
        if (searchInput) searchInput.value = '';
        document.querySelectorAll('.gal-filter').forEach(btn => {
          btn.classList.remove('bg-navy-800', 'text-white');
          btn.classList.add('bg-slate-200', 'text-slate-700');
        });
        const allBtn = document.getElementById('galFilterAll');
        if (allBtn) { allBtn.classList.remove('bg-slate-200', 'text-slate-700'); allBtn.classList.add('bg-navy-800', 'text-white'); }
        renderGalleryGrid();
      } catch (e) {
        container.innerHTML = '<div class="text-red-600">Error loading media</div>';
      }
    }

    async function uploadMediaGallery() {
      const fileInput = document.getElementById('mediaUploadFile');
      if (!fileInput.files.length) return;
      const form = new FormData();
      form.append('file', fileInput.files[0]);
      try {
        const r = await fetch(`${API_BASE}/upload`, { method: 'POST', headers: { 'X-Admin-Token': token }, body: form });
        const data = await r.json();
        if (data.success) { showToast('Image uploaded'); loadMediaGallery(); }
        else { showToast(data.error || 'Upload failed', 'error'); }
      } catch (e) { showToast('Upload error', 'error'); }
    }

    async function deleteMedia(key) {
      if (!confirm(`Delete "${key}"? This cannot be undone.`)) return;
      try {
        const r = await fetch(`${API_BASE}/media/${encodeURIComponent(key)}`, { method: 'DELETE', headers: { 'X-Admin-Token': token } });
        const data = await r.json();
        if (data.success) { showToast('Image deleted'); loadMediaGallery(); }
        else { showToast(data.error || 'Delete failed', 'error'); }
      } catch (e) { showToast('Delete error', 'error'); }
    }

    async function loadAnalytics(days) {
      const container = document.getElementById('analyticsContent');
      container.innerHTML = '<div class="text-slate-500">Loading...</div>';
      try {
        const r = await fetch(`${API_BASE}/analytics/report?days=${days}`, { headers: { 'X-Admin-Token': token } });
        const res = await r.json();
        if (!res.success) { container.innerHTML = '<div class="text-red-600">Failed to load analytics</div>'; return; }
        const d = res.data;
        let html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">`;
        html += `<div class="bg-navy-50 p-4 rounded-lg"><div class="text-sm text-slate-600">Total Views</div><div class="text-2xl font-bold text-navy-900">${d.totalViews}</div></div>`;
        html += `<div class="bg-navy-50 p-4 rounded-lg"><div class="text-sm text-slate-600">Avg Daily Views</div><div class="text-2xl font-bold text-navy-900">${d.avgDailyViews}</div></div>`;
        html += `<div class="bg-navy-50 p-4 rounded-lg"><div class="text-sm text-slate-600">Period</div><div class="text-2xl font-bold text-navy-900">${days} Days</div></div>`;
        html += `</div>`;
        if (d.dailyData && d.dailyData.length) {
          const maxViews = Math.max(...d.dailyData.map(day => day.views), 1);
          html += `<div class="mb-6"><h3 class="font-semibold text-slate-700 mb-3">Daily Views</h3><div class="space-y-2">`;
          d.dailyData.forEach(day => {
            const pct = Math.min(100, (day.views / maxViews) * 100) || 0;
            html += `<div class="flex items-center gap-3"><span class="text-sm text-slate-600 w-24">${day.date}</span><div class="flex-1 bg-slate-100 rounded h-4 overflow-hidden"><div class="bg-gold-400 h-4" style="width:${pct}%"></div></div><span class="text-sm text-slate-700 w-12 text-right">${day.views}</span></div>`;
          });
          html += `</div></div>`;
        }
        if (d.topPages && d.topPages.length) {
          html += `<div class="mb-4"><h3 class="font-semibold text-slate-700 mb-3">Top Pages</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-2">`;
          d.topPages.forEach(p => {
            html += `<div class="flex justify-between bg-white border rounded-lg px-3 py-2 text-sm"><span class="text-slate-600 truncate">${p.page}</span><span class="font-semibold text-navy-900">${p.views}</span></div>`;
          });
          html += `</div></div>`;
        }
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = '<div class="text-red-600">Error loading analytics</div>';
      }
    }

    window.addArrayItem = function(prefix) {
      const list = document.getElementById(prefix + '_list');
      const items = list.querySelectorAll('.array-item');
      const idx = items.length;
      let template = '';
      if (items.length > 0) {
        const first = items[0];
        const p = first.dataset.prefix;
        template = first.outerHTML.replace(new RegExp(p + '_0_', 'g'), prefix + '_' + idx + '_').replace(new RegExp(p + '_0', 'g'), prefix + '_' + idx);
        template = template.replace(/value="[^"]*"/g, 'value=""').replace(/>([^<]*)<\/textarea>/g, '></textarea>');
      } else {
        template = arrayItemWrapper(prefix, idx, smallInput(prefix + '_' + idx + '_label', 'Label', '') + smallInput(prefix + '_' + idx + '_value', 'Value', ''));
      }
      const div = document.createElement('div');
      div.innerHTML = template.trim();
      list.appendChild(div.firstElementChild);
    };

              subtitle: readInput('about_pillar_value_subtitle'),
              quote: readInput('about_pillar_value_quote'),
              items: readArray('about_pillar_value_item', ['icon', 'title', 'desc']),
            },
            commitment: {
              title: readInput('about_pillar_commitment_title'),
              subtitle: readInput('about_pillar_commitment_subtitle'),
              quote: readInput('about_pillar_commitment_quote'),
              items: readArray('about_pillar_commitment_item', ['icon', 'title', 'desc']),
            },
          },
          coreValues: {
            title: readInput('about_cv_title'),
            subtitle: readInput('about_cv_subtitle'),
            items: readArray('about_cv', ['icon', 'title', 'desc']),
          },
          team: {
            title: readInput('about_team_title'),
            subtitle: readInput('about_team_subtitle'),
            members: readArray('about_team', ['name', 'role', 'image']),
          },
          timeline: {
            title: readInput('about_timeline_title'),
            subtitle: readInput('about_timeline_subtitle'),
            events: readArray('about_tl', ['year', 'title', 'desc']),
          },
          cta: { title: readInput('about_cta_title'), desc: readInput('about_cta_desc'), btn: readInput('about_cta_btn'), href: readInput('about_cta_href') },
        };
      } else if (id === 'services') {
        const serviceDetails = readArray('services_detail', ['slug', 'title', 'subtitle', 'desc', 'image', 'features', 'linkText', 'href']).map(item => ({
          ...item,
          features: (item.features || '').split('\n').map(s => s.trim()).filter(Boolean),
        }));
        const processSteps = readArray('services_process', ['number', 'title', 'desc']);
        obj.services = {
          pageTitle: readInput('services_pageTitle'),
          introTitle: readInput('services_introTitle'),
          introDesc: readInput('services_introDesc'),
          serviceDetails,
          whyChoose: {
            title: readInput('services_whyChoose_title'),
            desc: readInput('services_whyChoose_desc'),
            items: readArray('services_whyChoose_item', ['icon', 'title', 'desc']),
          },
          process: {
            title: readInput('services_process_title'),
            subtitle: readInput('services_process_subtitle'),
            steps: processSteps,
          },
          cta: { title: readInput('services_cta_title'), desc: readInput('services_cta_desc'), btn: readInput('services_cta_btn'), href: readInput('services_cta_href') },
        };
      } else if (id.startsWith('service_')) {
        const slug = id.replace('service_', '');
        const overview = readInput(`svc_${slug}_overview`).split('\n').map(s => s.trim()).filter(Boolean);
        const statNumber = readInput(`svc_${slug}_overviewStatNumber`);
        const statLabel = readInput(`svc_${slug}_overviewStatLabel`);
        const scopeItems = readArray(`svc_${slug}_scope`, ['title', 'subtitle', 'icon', 'body', 'features']).map(item => ({
          ...item,
          features: (item.features || '').split('\n').map(s => s.trim()).filter(Boolean),
        }));
        const processSteps = readArray(`svc_${slug}_proc`, ['number', 'title', 'desc']);
        const whyItems = readArray(`svc_${slug}_why`, ['icon', 'title', 'desc']);
        const relatedItems = readArray(`svc_${slug}_related`, ['title', 'desc', 'href', 'linkText']);
        const scenarios = readArray(`svc_${slug}_scenarios`, ['title', 'desc', 'features']).map(item => ({
          ...item,
          features: (item.features || '').split('\n').map(s => s.trim()).filter(Boolean),
        }));
        const scenarios2 = readArray(`svc_${slug}_scenarios2`, ['title', 'desc', 'features']).map(item => ({
          ...item,
          features: (item.features || '').split('\n').map(s => s.trim()).filter(Boolean),
        }));
        obj.servicePages = {
          [slug]: {
            tagline: readInput(`svc_${slug}_tagline`),
            heroDesc: readInput(`svc_${slug}_heroDesc`),
            overviewTitle: readInput(`svc_${slug}_overviewTitle`),
            overview,
            overviewHighlight: readInput(`svc_${slug}_overviewHighlight`),
            overviewStat: statNumber ? { number: statNumber, label: statLabel } : null,
            overviewImage: readInput(`svc_${slug}_overviewImage`),
            scopeTitle: readInput(`svc_${slug}_scopeTitle`),
            scopeSubtitle: readInput(`svc_${slug}_scopeSubtitle`),
            serviceScopeSubtitle: readInput(`svc_${slug}_scopeSubtitle`),
            scopeItems,
            processTitle: readInput(`svc_${slug}_processTitle`),
            processSubtitle: readInput(`svc_${slug}_processSubtitle`),
            serviceProcessSubtitle: readInput(`svc_${slug}_processSubtitle`),
            processSteps,
            scenariosTitle: readInput(`svc_${slug}_scenariosTitle`),
            scenarios,
            scenarios2Title: readInput(`svc_${slug}_scenarios2Title`),
            scenarios2,
            whyTitle: readInput(`svc_${slug}_whyTitle`),
            whySubtitle: readInput(`svc_${slug}_whySubtitle`),
            whyItems,
            relatedServicesTitle: readInput(`svc_${slug}_relatedTitle`),
            relatedItems,
            ctaTitle: readInput(`svc_${slug}_ctaTitle`),
            ctaDesc: readInput(`svc_${slug}_ctaDesc`),
            ctaBtn: readInput(`svc_${slug}_ctaBtn`),
            ctaBtn2: readInput(`svc_${slug}_ctaBtn2`),
          }
        };
      } else if (id === 'contact') {
        const cards = readArray('contact_card', ['icon', 'title', 'lines']).map(c => ({
          ...c,
          lines: (c.lines || '').split('\n').map(s => s.trim()).filter(Boolean),
        }));
        obj.contact = {
          pageTitle: readInput('contact_pageTitle'),
          cards,
          form: {
            formTitle: readInput('contact_form_formTitle'),
            formDesc: readInput('contact_form_formDesc'),
            name: readInput('contact_form_name'),
            company: readInput('contact_form_company'),
            phone: readInput('contact_form_phone'),
            email: readInput('contact_form_email'),
            service: readInput('contact_form_service'),
            message: readInput('contact_form_message'),
            submit: readInput('contact_form_submit'),
            submitting: readInput('contact_form_submitting'),
            successMsg: readInput('contact_form_successMsg'),
            errorMsg: readInput('contact_form_errorMsg'),
            infoTitle: readInput('contact_form_infoTitle'),
            hoursTitle: readInput('contact_form_hoursTitle'),
            follow: readInput('contact_form_follow'),
            hours: readArray('contact_form_hours', ['day', 'time']),
            servicesList: readArray('contact_form_svc', ['value', 'label']),
          },
          map: {
            title: readInput('contact_map_title'),
            address: readInput('contact_map_address'),
            embedUrl: readInput('contact_map_embedUrl'),
          },
          faq: {
            title: readInput('contact_faq_title'),
            subtitle: readInput('contact_faq_subtitle'),
            items: readArray('contact_faq', ['q', 'a']),
          },
        };
      } else if (['purpose', 'value', 'commitment'].includes(id)) {
        obj[id] = {
          pageTitle: readInput(`${id}_pageTitle`),
          heroTitle: readInput(`${id}_heroTitle`),
          heroSubtitle: readInput(`${id}_heroSubtitle`),
          heroQuote: readInput(`${id}_heroQuote`),
          items: readArray(`${id}_item`, ['icon', 'title', 'desc']),
          cta: {
            title: readInput(`${id}_cta_title`),
            desc: readInput(`${id}_cta_desc`),
            btn: readInput(`${id}_cta_btn`),
            href: readInput(`${id}_cta_href`),
          },
        };
      }
      return obj;
    }

    window.saveSection = async function(id) {
      const payload = { [currentLang]: collectSection(id) };
      try {
        const r = await fetch(`${API_BASE}/data`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
          body: JSON.stringify(payload),
        });
        const data = await r.json();
        if (data.success) {
          showToast('Section saved');
          Object.assign(getLangObj(), payload[currentLang]);
        } else {
          showToast(data.error || 'Save failed', 'error');
        }
      } catch (e) {
        showToast('Save error', 'error');
      }
    };

    window.doDeploy = async function() {
      try {
        const r = await fetch(`${API_BASE}/deploy`, { method: 'POST', headers: { 'X-Admin-Token': token } });
        const data = await r.json();
        if (data.success) {
          showToast('Deploy triggered');
        } else {
          const msg = data.error || 'Deploy failed';
          const details = data.details || '';
          showToast(msg + (details ? (' | ' + String(details).slice(0, 120)) : ''), 'error');
        }
      } catch (e) { showToast('Deploy error', 'error'); }
    };
  </script>
</body>
