<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2577E3"/>
      <stop offset="100%" style="stop-color:#4A90E2"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFB800"/>
    </linearGradient>
  </defs>
  
  <!-- Main Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)"/>
  
  <!-- Building Icon -->
  <rect x="60" y="50" width="30" height="100" rx="4" fill="white" opacity="0.95"/>
  <rect x="95" y="70" width="30" height="80" rx="4" fill="white" opacity="0.9"/>
  <rect x="130" y="90" width="25" height="60" rx="4" fill="white" opacity="0.85"/>
  
  <!-- Windows -->
  <rect x="67" y="60" width="8" height="8" rx="1" fill="#2577E3"/>
  <rect x="82" y="60" width="8" height="8" rx="1" fill="#2577E3"/>
  <rect x="67" y="75" width="8" height="8" rx="1" fill="#2577E3"/>
  <rect x="82" y="75" width="8" height="8" rx="1" fill="#2577E3"/>
  <rect x="67" y="90" width="8" height="8" rx="1" fill="#2577E3"/>
  <rect x="82" y="90" width="8" height="8" rx="1" fill="#2577E3"/>
  
  <!-- Accent Element -->
  <circle cx="155" cy="45" r="15" fill="url(#accentGradient)"/>
  <text x="155" y="50" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">+</text>
</svg>
