<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LT Group CPA - Professional Accounting Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #c9a227;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        
        .form-container {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #475569;
            border-radius: 8px;
            background: #1e293b;
            color: #f1f5f9;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #c9a227;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        button {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #c9a227 0%, #d4af37 100%);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(201, 162, 39, 0.4);
        }
        
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        
        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        
        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        
        .info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            text-align: left;
        }
        
        .info h3 {
            color: #60a5fa;
            margin-bottom: 10px;
        }
        
        .info p {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f1f5f9;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LT Group CPA</h1>
        <p class="subtitle">專業會計服務 | Professional Accounting Services</p>
        
        <div class="form-container">
            <h2 style="margin-bottom: 24px; color: #f1f5f9;">免費諮詢 | Free Consultation</h2>
            
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">姓名 * | Name *</label>
                    <input type="text" id="name" name="name" required placeholder="請輸入您的姓名">
                </div>
                
                <div class="form-group">
                    <label for="phone">電話 * | Phone *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="請輸入您的電話">
                </div>
                
                <div class="form-group">
                    <label for="email">電郵 | Email</label>
                    <input type="email" id="email" name="email" placeholder="請輸入您的電郵">
                </div>
                
                <div class="form-group">
                    <label for="company">公司 | Company</label>
                    <input type="text" id="company" name="company" placeholder="請輸入您的公司名稱">
                </div>
                
                <div class="form-group">
                    <label for="service">感興趣的服務 | Service Interested</label>
                    <select id="service" name="service">
                        <option value="">請選擇服務類型</option>
                        <option value="audit">審計服務 Audit Services</option>
                        <option value="tax">稅務服務 Tax Services</option>
                        <option value="consulting">商業顧問 Business Consulting</option>
                        <option value="other">其他 Others</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">訊息 | Message</label>
                    <textarea id="message" name="message" placeholder="請描述您的需求..."></textarea>
                </div>
                
                <button type="submit" id="submitBtn">
                    提交查詢 | Submit Inquiry
                </button>
            </form>
            
            <div id="status" class="status"></div>
        </div>
        
        <div class="info">
            <h3>📞 聯繫我們 | Contact Us</h3>
            <p>
                <strong>電話 Phone:</strong> +852 5116 4453<br>
                <strong>電郵 Email:</strong> info@ltgroupcpa.com<br>
                <strong>地址 Address:</strong> 香港中環德輔道中10號皇后像廣場
            </p>
            <p style="margin-top: 10px;">
                <strong>API Status:</strong> <span id="apiStatus">Checking...</span>
            </p>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'https://ltcpa-cms-worker.jimsbond007.workers.dev';
        
        // Check API health on page load
        async function checkApiHealth() {
            try {
                const response = await fetch(`${API_BASE}/api/health`, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (response.ok) {
                    document.getElementById('apiStatus').textContent = '✅ Online';
                    document.getElementById('apiStatus').style.color = '#22c55e';
                } else {
                    throw new Error('API not responding');
                }
            } catch (error) {
                document.getElementById('apiStatus').textContent = '❌ Offline';
                document.getElementById('apiStatus').style.color = '#ef4444';
                console.error('API Health Check Failed:', error);
            }
        }
        
        // Handle form submission
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '提交中... <span class="loading"></span>';
            statusDiv.className = 'status';
            
            // Get form data
            const formData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                company: document.getElementById('company').value,
                service: document.getElementById('service').value,
                message: document.getElementById('message').value
            };
            
            try {
                // Submit to Worker API with CORS
                const response = await fetch(`${API_BASE}/api/inquiries/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    mode: 'cors',
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Success
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ 提交成功！我們會盡快與您聯繫。';
                    
                    // Reset form
                    document.getElementById('contactForm').reset();
                } else {
                    // API returned error
                    throw new Error(result.error || '提交失敗');
                }
            } catch (error) {
                // Error
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ ' + (error.message || '網絡錯誤，請稍後再試');
                console.error('Form Submission Error:', error);
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.textContent = '提交查詢 | Submit Inquiry';
            }
        });
        
        // Check API health on load
        checkApiHealth();
    </script>
</body>
</html>
