name: Deploy LTCPA Website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_INQUIRY_API_URL: ${{ secrets.NEXT_PUBLIC_INQUIRY_API_URL }}
          NEXT_PUBLIC_CMS_API_URL: ${{ secrets.NEXT_PUBLIC_CMS_API_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ltcpa-website
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      # ------------------------------------------------------------------
      # CMS API Worker
      # ------------------------------------------------------------------
      - name: Deploy CMS API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/cms-api
          command: deploy

      - name: Restore CMS Worker GITHUB_TOKEN Secret
        working-directory: workers/cms-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GH_TOKEN: ${{ secrets.WORKER_GITHUB_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            echo '{"GITHUB_TOKEN":"'$GH_TOKEN'"}' > secrets.json
            npx wrangler secret bulk secrets.json
          fi

      # ------------------------------------------------------------------
      # Inquiry Worker
      # ------------------------------------------------------------------
      - name: Deploy Inquiry Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/inquiry-api
          command: deploy

      - name: Restore Inquiry Worker RESEND_API_KEY Secret
        working-directory: workers/inquiry-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -n "$RESEND_KEY" ]; then
            echo '{"RESEND_API_KEY":"'$RESEND_KEY'"}' > secrets.json
            npx wrangler secret bulk secrets.json
          fi
