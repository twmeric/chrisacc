name: Deploy LTCPA Website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_INQUIRY_API_URL: ${{ secrets.NEXT_PUBLIC_INQUIRY_API_URL }}
          NEXT_PUBLIC_CMS_API_URL: ${{ secrets.NEXT_PUBLIC_CMS_API_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ltcpa-website
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Deploy CMS API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/cms-api
          command: deploy

      - name: Deploy Inquiry Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/inquiry-api
          command: deploy

      # ------------------------------------------------------------------
      # Restore Worker Secrets AFTER all deploys (deploy may clear them)
      # Using Cloudflare REST API directly — most reliable method
      # ------------------------------------------------------------------
      - name: Restore CMS Worker GITHUB_TOKEN Secret
        continue-on-error: true
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.WORKER_GITHUB_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/ltcpa-cms-api/secrets" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"GITHUB_TOKEN","text":"'"$GH_TOKEN"'","type":"secret_text"}'
          fi

      - name: Restore Inquiry Worker RESEND_API_KEY Secret
        continue-on-error: true
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -n "$RESEND_KEY" ]; then
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/ltcpa-inquiry-api/secrets" \
              -H "Authorization: Bearer $CF_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"RESEND_API_KEY","text":"'"$RESEND_KEY"'","type":"secret_text"}'
          fi
